name: Backend physics tests

on:
  pull_request:
    paths:
      - "backend/**"
      - "scripts/**"
      - ".github/workflows/backend-tests.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "scripts/**"
      - ".github/workflows/backend-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-lock.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-lock.txt

      - name: Compile backend modules
        run: python -m compileall -q app engine

      - name: Run backend tests
        run: python -m pytest -q
