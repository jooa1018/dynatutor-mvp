name: DynaTutor release tests

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "scripts/**"
      - ".github/workflows/backend-tests.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "scripts/**"
      - ".github/workflows/backend-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dynatutor-release-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-lock.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-lock.txt

      - name: Compile backend modules
        run: python -m compileall -q app engine

      # These marker groups cover the collected backend suite. Keep each group
      # bounded and run it once; raw default/complete passes duplicate them.
      - name: Run backend fast wrapper
        run: bash ../scripts/check_backend_fast.sh

      - name: Run backend benchmark wrapper
        run: bash ../scripts/check_backend_benchmark.sh

      - name: Run backend audit wrapper
        run: bash ../scripts/check_backend_audit.sh

      - name: Run backend frontend-marker tests
        run: python -m pytest -q -o addopts= -m "frontend"

      - name: Check frontend repository metadata
        run: bash ../scripts/check_frontend_metadata.sh

      - name: Enforce warm solve latency budget
        run: >-
          python scripts/measure_phase42_latency.py
          --repeats 2
          --warmups 1
          --block-optional-dependencies
          --max-mean-ms 60
          --max-p95-ms 120

      - name: Enforce cold import and RSS budgets
        run: >-
          python scripts/measure_runtime_budget.py
          --max-import-ms 5000
          --max-rss-mb 512

      - name: Measure PR10 hotfix head performance
        if: github.event_name != 'pull_request'
        run: >-
          python scripts/measure_pr10_hotfix_performance.py
          --output "$RUNNER_TEMP/pr10-head-performance.json"
          --repeats 30
          --warmups 5

      - name: Measure balanced PR10 hotfix performance rounds
        if: github.event_name == 'pull_request'
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          round_dir="$RUNNER_TEMP/pr10-performance-rounds"
          head_worktree="$RUNNER_TEMP/dynatutor-pr-head"
          base_worktree="$RUNNER_TEMP/dynatutor-pr-base"
          mkdir -p "$round_dir"
          git worktree add --detach "$head_worktree" "$HEAD_SHA"
          git worktree add --detach "$base_worktree" "$BASE_SHA"

          for round_number in 1 2 3 4; do
            if (( round_number % 2 == 1 )); then
              order=(head base)
            else
              order=(base head)
            fi
            position=1
            for revision_label in "${order[@]}"; do
              if [[ "$revision_label" == "head" ]]; then
                revision_sha="$HEAD_SHA"
                revision_worktree="$head_worktree"
              else
                revision_sha="$BASE_SHA"
                revision_worktree="$base_worktree"
              fi
              (
                cd "$revision_worktree/backend"
                python "$head_worktree/backend/scripts/measure_pr10_hotfix_performance.py" \
                  --output "$round_dir/round-${round_number}-${revision_label}.json" \
                  --repeats 60 \
                  --warmups 10 \
                  --include-raw-samples \
                  --revision-label "$revision_label" \
                  --revision-sha "$revision_sha" \
                  --round-number "$round_number" \
                  --position "$position"
              )
              position=$((position + 1))
            done
          done

      - name: Compare pooled PR10 hotfix performance
        if: github.event_name == 'pull_request'
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: >-
          python "$RUNNER_TEMP/dynatutor-pr-head/backend/scripts/measure_pr10_hotfix_performance.py"
          --compare-round-dir "$RUNNER_TEMP/pr10-performance-rounds"
          --expected-rounds 4
          --expected-head-sha "$HEAD_SHA"
          --expected-base-sha "$BASE_SHA"
          --max-regression-percent 15
          --output "$RUNNER_TEMP/pr10-pooled-performance.json"

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Test frontend clarification logic
        run: npm test

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build
