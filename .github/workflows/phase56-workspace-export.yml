name: Phase 56 workspace export

# Temporary Stage 6 bootstrap; removed after the local workspace and exact Git
# objects are materialized. This workflow never reads secrets or calls a model.
on:
  pull_request:
    branches:
      - codex/phase55-gpt-first-textbook-parser
    paths:
      - ".github/workflows/phase56-workspace-export.yml"
  push:
    branches:
      - codex/phase56-generic-mechanics-engine
    paths:
      - ".github/workflows/phase56-workspace-export.yml"

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out exact branch history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create deterministic source snapshot and Git bundle
        shell: bash
        run: |
          set -euo pipefail
          tar \
            --exclude=.git \
            --exclude='backend/.pytest_cache' \
            --exclude='frontend/node_modules' \
            -czf "$RUNNER_TEMP/dynatutor-phase56-workspace.tar.gz" .
          git bundle create "$RUNNER_TEMP/dynatutor-phase56.git.bundle" --all
          git bundle verify "$RUNNER_TEMP/dynatutor-phase56.git.bundle"

      - name: Upload exact workspace artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dynatutor-phase56-workspace-${{ github.sha }}
          path: |
            ${{ runner.temp }}/dynatutor-phase56-workspace.tar.gz
            ${{ runner.temp }}/dynatutor-phase56.git.bundle
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
