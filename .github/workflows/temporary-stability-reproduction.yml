name: temporary stability validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-lock.txt
      - name: Affected regression tests
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: >-
          python -m pytest
          backend/tests/test_phase10_korean_quality_benchmark.py
          backend/tests/test_phase13_benchmark_300.py
          backend/tests/test_phase20_benchmark_audit.py
          backend/tests/test_phase24_final_polish_deployment.py
          backend/tests/test_phase25_blind_textbook_benchmark.py
          backend/tests/test_phase27_stability.py
          backend/tests/test_phase28_stability.py
          backend/tests/test_phase36_deploy_parser_cleanup.py
          backend/tests/test_phase41_followup.py
          -q -o addopts=
      - name: Backend fast
        run: bash scripts/check_backend_fast.sh
      - name: Backend requested full
        run: python -m pytest backend/tests -q
      - name: Backend unfiltered full
        run: python -m pytest backend/tests -q -o addopts=
      - name: Frontend metadata
        run: bash scripts/check_frontend_metadata.sh
      - name: Frontend build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          CI: "1"
          DYNATUTOR_FRONTEND_BUILD_TIMEOUT: "180"
          DYNATUTOR_FRONTEND_BUILD_KILL_AFTER: "10"
        run: bash scripts/check_frontend_build.sh
