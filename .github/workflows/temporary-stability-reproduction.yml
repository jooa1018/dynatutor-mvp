name: temporary stability reproduction

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  reproduce:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-lock.txt
      - name: Reproduce unfiltered and metadata failures
        shell: bash
        run: |
          set +e
          export PYTHONPATH="$PWD/backend"
          python -m pytest backend/tests -q -o addopts= 2>&1 | tee unfiltered.log
          backend_status=${PIPESTATUS[0]}
          bash scripts/check_frontend_metadata.sh 2>&1 | tee frontend_metadata.log
          frontend_status=${PIPESTATUS[0]}
          echo "backend_status=$backend_status frontend_status=$frontend_status"
          exit $(( backend_status || frontend_status ))
