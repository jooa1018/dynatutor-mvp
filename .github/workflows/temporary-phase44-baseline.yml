name: temporary Phase 44 validation

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-lock.txt
      - name: Run Phase 44 benchmark
        shell: bash
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: python backend/tools/run_phase44_nlp_benchmark.py
