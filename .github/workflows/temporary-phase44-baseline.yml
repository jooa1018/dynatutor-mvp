name: temporary Phase 44 full validation

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-lock.txt
      - name: Phase 44 contract tests
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: time python -m pytest backend/tests/test_phase44_korean_nlp_robustness.py -q
      - name: Phase 44 benchmark
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: time python backend/tools/run_phase44_nlp_benchmark.py > /tmp/phase44_report.json
      - name: Backend fast tests
        run: time bash scripts/check_backend_fast.sh
      - name: Backend full tests
        run: time python -m pytest backend/tests -q
      - name: Frontend metadata
        run: time bash scripts/check_frontend_metadata.sh
      - name: Final repository state
        run: |
          git status --short
          git diff --stat
