name: Phase 56 Wave F candidate apply

on:
  push:
    branches:
      - agent/phase56-wave-f-apply-20260723-a
    paths:
      - ".github/workflows/phase56-wave-f-apply.yml"

permissions:
  contents: write

concurrency:
  group: phase56-wave-f-candidate-apply
  cancel-in-progress: false

jobs:
  apply-and-validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out staging payload
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Preserve pinned patch payload
        run: cat .phase56/wave-f/part-*.b64 > "$RUNNER_TEMP/wave_f_product.patch.gz.b64"

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-lock.txt

      - name: Reconstruct exact target worktree
        env:
          EXPECTED_BASE: 951b5c699f7b3b3b006c8c05e02f59bec46d7e11
        run: |
          git fetch origin codex/phase56-generic-mechanics-engine
          git switch --detach origin/codex/phase56-generic-mechanics-engine
          test "$(git rev-parse HEAD)" = "$EXPECTED_BASE"
          base64 -d "$RUNNER_TEMP/wave_f_product.patch.gz.b64" | gzip -d > "$RUNNER_TEMP/wave_f_product.patch"
          git apply --check "$RUNNER_TEMP/wave_f_product.patch"
          git apply "$RUNNER_TEMP/wave_f_product.patch"
          git diff --check

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-lock.txt

      - name: Compile changed mechanics modules
        run: |
          python -m py_compile \
            backend/engine/mechanics/compiler/compiler.py \
            backend/engine/mechanics/laws/core.py \
            backend/tests/test_phase56_mechanics_plane_rigid_body_acceleration_same_fixture_parity.py \
            backend/tests/test_phase56_mechanics_plane_rigid_body_velocity_same_fixture_parity.py \
            backend/tests/test_phase56_mechanics_polar_kinematics_same_fixture_parity.py \
            backend/tests/test_phase56_mechanics_instant_center_velocity_same_fixture_parity.py
          python -m compileall -q backend/engine/mechanics

      - name: Run Wave F focused fast tests
        working-directory: backend
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          PYTHONPATH: ${{ github.workspace }}/backend:${{ github.workspace }}/backend/tests
        run: >-
          python -m pytest -q -o addopts= -m "not slow"
          tests/test_phase56_mechanics_plane_rigid_body_acceleration_same_fixture_parity.py
          tests/test_phase56_mechanics_plane_rigid_body_velocity_same_fixture_parity.py
          tests/test_phase56_mechanics_polar_kinematics_same_fixture_parity.py
          tests/test_phase56_mechanics_instant_center_velocity_same_fixture_parity.py

      - name: Run Wave F focused slow tests
        working-directory: backend
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          PYTHONPATH: ${{ github.workspace }}/backend:${{ github.workspace }}/backend/tests
        run: >-
          python -m pytest -q -o addopts= -m slow
          tests/test_phase56_mechanics_plane_rigid_body_acceleration_same_fixture_parity.py
          tests/test_phase56_mechanics_plane_rigid_body_velocity_same_fixture_parity.py
          tests/test_phase56_mechanics_polar_kinematics_same_fixture_parity.py
          tests/test_phase56_mechanics_instant_center_velocity_same_fixture_parity.py

      - name: Run directly connected mechanics regressions
        working-directory: backend
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          PYTHONPATH: ${{ github.workspace }}/backend:${{ github.workspace }}/backend/tests
        run: >-
          python -m pytest -q -o addopts=
          tests/test_phase56_mechanics_compiler.py
          tests/test_phase56_mechanics_solver_contract.py
          tests/test_phase56_mechanics_solver_planner.py
          tests/test_phase56_mechanics_solver_execution.py
          tests/test_phase56_mechanics_verification_contract.py
          tests/test_phase56_mechanics_solver_verification_integration.py
          tests/test_phase56_mechanics_normalization.py
          tests/test_phase56_mechanics_validation.py
          tests/test_phase56_mechanics_migration_scope.py
          tests/test_phase56_mechanics_deferred_scope.py
          tests/test_phase56_mechanics_runtime_contract.py
          tests/test_phase56_mechanics_runtime_static.py

      - name: Commit exact product candidate
        env:
          CANDIDATE_BRANCH: agent/phase56-wave-f-product-20260723-a
        run: |
          git config user.name "phase56-wave-f-bot"
          git config user.email "phase56-wave-f-bot@users.noreply.github.com"
          git add \
            backend/engine/mechanics/compiler/compiler.py \
            backend/engine/mechanics/laws/core.py \
            backend/tests/test_phase56_mechanics_plane_rigid_body_acceleration_same_fixture_parity.py \
            backend/tests/test_phase56_mechanics_plane_rigid_body_velocity_same_fixture_parity.py \
            backend/tests/test_phase56_mechanics_polar_kinematics_same_fixture_parity.py \
            backend/tests/test_phase56_mechanics_instant_center_velocity_same_fixture_parity.py
          test -z "$(git status --porcelain | grep -v '^A  \|^M  ' || true)"
          git commit -m "feat(mechanics): complete Wave F legacy migrations"
          git push origin "HEAD:refs/heads/$CANDIDATE_BRANCH"
