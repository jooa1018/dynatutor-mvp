name: Temporary Phase 44 hold audit

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-lock.txt

      - name: Install locked backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-lock.txt

      - name: Phase 44 contract tests
        continue-on-error: true
        env:
          PYTHONPATH: backend
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: |
          /usr/bin/time -p python -m pytest backend/tests/test_phase44_korean_nlp_robustness.py -q -o addopts=

      - name: Phase 44 NLP benchmark and metric summary
        continue-on-error: true
        env:
          PYTHONPATH: backend
        run: |
          /usr/bin/time -p python backend/tools/run_phase44_nlp_benchmark.py --json-out /tmp/phase44-audit.json > /tmp/phase44-benchmark-stdout.json
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("/tmp/phase44-audit.json").read_text(encoding="utf-8"))
          fixture = json.loads(Path("backend/tests/benchmarks/phase44_korean_nlp_curated.json").read_text(encoding="utf-8"))
          print("fixture_case_count", len(fixture["cases"]))
          counts = {}
          for case in fixture["cases"]:
              counts[case["category"]] = counts.get(case["category"], 0) + 1
          print("fixture_category_counts", json.dumps(counts, ensure_ascii=False, sort_keys=True))
          print("metrics", json.dumps(report["metrics"], ensure_ascii=False, sort_keys=True))
          print("confidence_bins", json.dumps(report["confidence_bins"], ensure_ascii=False, sort_keys=True))
          print("failure_counts", json.dumps({key: len(items) for key, items in report["failures"].items()}, ensure_ascii=False, sort_keys=True))
          print("gates_passed", report["gates"]["passed"])
          print("all_gate_results", json.dumps(report["gates"]["results"], ensure_ascii=False, sort_keys=True))
          PY

      - name: Phase 43 regression tests
        continue-on-error: true
        env:
          PYTHONPATH: backend
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: |
          mapfile -t phase43_files < <(find backend/tests -maxdepth 1 -type f \( -iname '*phase43*' -o -iname '*provenance*' \) | sort)
          printf 'Phase 43 regression files:\n'
          printf '%s\n' "${phase43_files[@]}"
          if [ "${#phase43_files[@]}" -eq 0 ]; then
            echo "No Phase 43/provenance test files discovered"
            exit 2
          fi
          /usr/bin/time -p python -m pytest "${phase43_files[@]}" -q -o addopts=

      - name: Backend fast tests
        continue-on-error: true
        run: |
          /usr/bin/time -p bash scripts/check_backend_fast.sh

      - name: Backend full requested suite
        continue-on-error: true
        env:
          PYTHONPATH: backend
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: |
          /usr/bin/time -p python -m pytest backend/tests -q

      - name: Frontend metadata
        continue-on-error: true
        run: |
          /usr/bin/time -p bash scripts/check_frontend_metadata.sh

      - name: Final checkout status
        if: always()
        run: |
          echo "git status --short"
          git status --short
          echo "git diff --stat"
          git diff --stat
