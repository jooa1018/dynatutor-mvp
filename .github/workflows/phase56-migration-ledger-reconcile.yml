name: Phase 56 migration ledger reconcile

on:
  push:
    branches:
      - agent/phase56-wave-e-staging-20260723
    paths:
      - ".github/workflows/phase56-migration-ledger-reconcile.yml"

permissions:
  contents: write

concurrency:
  group: phase56-migration-ledger-reconcile
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check out exact Phase 56 head
        run: |
          set -euo pipefail
          git fetch --prune origin codex/phase56-generic-mechanics-engine
          test "$(git rev-parse origin/codex/phase56-generic-mechanics-engine)" = "9c35b6abbb7c89ccdb9c7ff05cd4580f8fa9cf7c"
          git switch --detach origin/codex/phase56-generic-mechanics-engine
          git switch -c phase56-ledger-reconcile
      - name: Reconcile accepted migration checkpoints and progress contract
        run: |
          set -euo pipefail
          cat > /tmp/ledger.patch <<'PATCH'
          diff --git a/backend/engine/mechanics/migration/parity.py b/backend/engine/mechanics/migration/parity.py
