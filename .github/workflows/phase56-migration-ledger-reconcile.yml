          +    "incline_no_friction": "5e49f2f267c4c8d75aec6e99e3714fc36f700257",
          +    "incline_with_friction": "c134664cd863d33b50c7e5ae794af2ad61ed6524",
          +    "pulley_atwood": "dedb4c7c773bf24bc27038b0d5d5f658e5d28ba9",
          +    "pulley_table_hanging": "7fff1b83f42ed5f1ddf6046f456b2c9f924cb54e",
          +    "pulley_incline_hanging": "8f18c710fc6d5d730fcceccfb30e3175c2613902",
          +    "massive_pulley_atwood": "8f18c710fc6d5d730fcceccfb30e3175c2613902",
          +    "pure_rolling_energy": "305c68d6e7173740d478fd41c11b4ae78a245469",
          +    "rolling_energy_general": "305c68d6e7173740d478fd41c11b4ae78a245469",
          +    "vertical_circle": "305c68d6e7173740d478fd41c11b4ae78a245469",
          +    "collision_1d": "67f46e9c84a658d1d5a50b9dfcdce81f78f20d8d",
          +    "constant_acceleration_1d": "67f46e9c84a658d1d5a50b9dfcdce81f78f20d8d",
