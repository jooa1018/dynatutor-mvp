name: Phase 56 Stage 6 multimodal

on:
  push:
    branches:
      - codex/phase56-generic-mechanics-engine
  pull_request:
    branches:
      - codex/phase55-gpt-first-textbook-parser
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase56-stage6-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    env:
      PYTHONHASHSEED: "0"
      OPENAI_API_KEY: ""
      ANTHROPIC_API_KEY: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-lock.txt
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
      - name: Compile backend
        run: python -m compileall -q app engine tests
      - name: Stage 6 focused contracts
        run: python -m pytest -q tests/test_phase56_stage6*.py
      - name: Full backend regression
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Generate exact ESLint dependency lock
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund
      - name: Upload generated ESLint lock
        uses: actions/upload-artifact@v4
        with:
          name: stage6-eslint-lock-${{ github.sha }}
          path: |
            frontend/package.json
            frontend/package-lock.json
          if-no-files-found: error
          retention-days: 1
      - name: Install frontend dependencies
        run: npm ci
      - name: Frontend tests
        run: |
          set +e
          npm test > frontend-test.log 2>&1
          status=$?
          cat frontend-test.log
          exit "$status"
        env:
          CI: "true"
      - name: Frontend lint
        run: |
          set +e
          npm run lint > frontend-lint.log 2>&1
          status=$?
          cat frontend-lint.log
          exit "$status"
      - name: Frontend typecheck
        if: always()
        run: |
          set +e
          npm run typecheck > frontend-typecheck.log 2>&1
          status=$?
          cat frontend-typecheck.log
          exit "$status"
      - name: Frontend production build
        if: always()
        run: |
          set +e
          npm run build > frontend-build.log 2>&1
          status=$?
          cat frontend-build.log
          exit "$status"
      - name: Upload frontend gate diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stage6-frontend-gate-logs-${{ github.sha }}
          path: |
            frontend/frontend-test.log
            frontend/frontend-lint.log
            frontend/frontend-typecheck.log
            frontend/frontend-build.log
          if-no-files-found: warn
          retention-days: 1
