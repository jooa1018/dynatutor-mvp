name: temporary phase43 final scope audit

on:
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Working tree status
        run: |
          echo "GIT_STATUS_SHORT_BEGIN"
          git status --short
          echo "GIT_STATUS_SHORT_END"
      - name: Final diff stat without this temporary workflow
        run: |
          echo "GIT_DIFF_STAT_BEGIN"
          git diff --stat origin/main...HEAD -- . ':(exclude).github/workflows/temporary-phase43-final-audit.yml'
          echo "GIT_DIFF_STAT_END"
          echo "GIT_DIFF_NAMES_BEGIN"
          git diff --name-only origin/main...HEAD -- . ':(exclude).github/workflows/temporary-phase43-final-audit.yml'
          echo "GIT_DIFF_NAMES_END"
      - name: Reject generated artifacts
        run: |
          if git diff --name-only origin/main...HEAD -- . ':(exclude).github/workflows/temporary-phase43-final-audit.yml' |
             grep -E '(^|/)(node_modules|__pycache__|\.pytest_cache|.*\.db$|.*\.sqlite|benchmark.*report)'; then
            echo "generated artifact found"
            exit 1
          fi
