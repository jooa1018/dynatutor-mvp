name: Phase 45 validation

on:
  push:
    branches:
      - agent/phase45

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Phase 45 focused tests
        working-directory: backend
        run: pytest -q -o addopts='' tests/test_phase45_typed_dynamics_model.py
      - name: Default backend regression
        working-directory: backend
        run: pytest -q
      - name: Backend fast contract
        run: bash scripts/check_backend_fast.sh
      - name: Full unfiltered backend regression
        working-directory: backend
        run: pytest -q -o addopts=''
