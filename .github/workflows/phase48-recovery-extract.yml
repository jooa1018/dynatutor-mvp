name: Phase 48 verified inner archive recovery

on:
  push:
    branches:
      - backup/phase48-wip-20260712
    paths:
      - recovery/phase48_wip/wjs.zip
      - .github/workflows/phase48-recovery-extract.yml
  pull_request:
    branches:
      - codex/phase47-54-engine-completion
    paths:
      - recovery/phase48_wip/wjs.zip
      - .github/workflows/phase48-recovery-extract.yml

  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-and-extract:
    runs-on: ubuntu-latest
    steps:
      - name: Check out backup branch
        uses: actions/checkout@v4
        with:
          ref: backup/phase48-wip-20260712

      - name: Validate exact wjs.zip and extract verified UTF-8 drafts
        shell: bash
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          import hashlib
          import io
          import json
          import os
          import shutil
          import zipfile
          from pathlib import Path, PurePosixPath

          ROOT = Path("recovery/phase48_wip")
          ARCHIVE = ROOT / "wjs.zip"
          RECORDED_MANIFEST = ROOT / "manifest.json"
          EXTRACTED = ROOT / "extracted"
          VALIDATION = ROOT / "validation"
          EXPECTED_SHA256 = "9083aba0d33f2dcc5c41f935677750e917f9a459449e414e113272b474b387f3"
          EXPECTED_BYTES = 55370

          def sha256(data: bytes) -> str:
              return hashlib.sha256(data).hexdigest()

          def safe_member(name: str) -> bool:
              path = PurePosixPath(name)
              return (
                  bool(name)
                  and "\\" not in name
                  and not path.is_absolute()
                  and ".." not in path.parts
              )

          archive_bytes = ARCHIVE.read_bytes()
          archive_sha = sha256(archive_bytes)
          print(
              f"wjs.zip diagnostics: bytes={len(archive_bytes)}, "
              f"sha256={archive_sha}, head={archive_bytes[:16].hex()}, "
              f"tail={archive_bytes[-16:].hex()}",
              flush=True,
          )
          if len(archive_bytes) != EXPECTED_BYTES:
              raise SystemExit(
                  f"wjs.zip size mismatch: expected {EXPECTED_BYTES}, got {len(archive_bytes)}"
              )
          if archive_sha != EXPECTED_SHA256:
              raise SystemExit(
                  f"wjs.zip SHA-256 mismatch: expected {EXPECTED_SHA256}, got {archive_sha}"
              )
          if not zipfile.is_zipfile(io.BytesIO(archive_bytes)):
              raise SystemExit("wjs.zip does not contain a valid ZIP central directory")

          recorded = json.loads(RECORDED_MANIFEST.read_text(encoding="utf-8"))
          if recorded.get("archive_sha256") != EXPECTED_SHA256:
              raise SystemExit("recorded manifest archive SHA-256 is inconsistent")
          recorded_files = recorded.get("files")
          if not isinstance(recorded_files, list):
              raise SystemExit("recorded manifest files must be a list")
          expected_by_path = {item["path"]: item for item in recorded_files}
          if len(expected_by_path) != len(recorded_files):
              raise SystemExit("recorded manifest contains duplicate paths")

          verified_files = []
          extracted_payloads = {}
          with zipfile.ZipFile(io.BytesIO(archive_bytes)) as archive:
              infos = [info for info in archive.infolist() if not info.is_dir()]
              names = [info.filename for info in infos]
              unsafe = sorted(name for name in names if not safe_member(name))
              if unsafe:
                  raise SystemExit(f"unsafe wjs.zip paths: {unsafe}")
              if len(names) != len(set(names)):
                  raise SystemExit("wjs.zip contains duplicate paths")
              if set(names) != set(expected_by_path):
                  missing = sorted(set(expected_by_path) - set(names))
                  unexpected = sorted(set(names) - set(expected_by_path))
                  raise SystemExit(
                      f"wjs.zip manifest mismatch: missing={missing}, unexpected={unexpected}"
                  )

              for info in infos:
                  data = archive.read(info.filename)
                  expected = expected_by_path[info.filename]
                  actual_sha = sha256(data)
                  if actual_sha != expected["sha256"]:
                      raise SystemExit(
                          f"file SHA-256 mismatch for {info.filename}: "
                          f"expected {expected['sha256']}, got {actual_sha}"
                      )
                  if len(data) != expected["bytes"]:
                      raise SystemExit(
                          f"file size mismatch for {info.filename}: "
                          f"expected {expected['bytes']}, got {len(data)}"
                      )
                  try:
                      text = data.decode("utf-8")
                  except UnicodeDecodeError as exc:
                      raise SystemExit(f"non-UTF-8 file {info.filename}: {exc}") from exc
                  logical_lines = len(text.splitlines())
                  manifest_lines = text.count("\n") + 1
                  if manifest_lines != expected["lines"]:
                      raise SystemExit(
                          f"line-count mismatch for {info.filename}: "
                          f"expected {expected['lines']}, "
                          f"LF-plus-one={manifest_lines}, logical={logical_lines}"
                      )
                  extracted_payloads[info.filename] = data
                  verified_files.append(
                      {
                          "path": info.filename,
                          "bytes": len(data),
                          "lines": manifest_lines,
                          "logical_lines": logical_lines,
                          "line_count_convention": "LF count plus one",
                          "sha256": actual_sha,
                          "encoding": "utf-8",
                      }
                  )

          if EXTRACTED.exists():
              shutil.rmtree(EXTRACTED)
          VALIDATION.mkdir(parents=True, exist_ok=True)
          for relative, data in extracted_payloads.items():
              destination = EXTRACTED / PurePosixPath(relative)
              destination.parent.mkdir(parents=True, exist_ok=True)
              destination.write_bytes(data)

          report = {
              "status": "verified",
              "source_commit": os.environ.get("GITHUB_SHA"),
              "archive": {
                  "path": ARCHIVE.as_posix(),
                  "bytes": len(archive_bytes),
                  "sha256": archive_sha,
                  "manifest_file_count": len(recorded_files),
                  "actual_file_count": len(verified_files),
              },
              "superseded_outer_upload": {
                  "path": (
                      "recovery/phase48_wip/"
                      "dynatutor_phase48_emergency_backup_20260712.zip"
                  ),
                  "status": "truncated_unusable",
                  "actual_bytes": 6057,
                  "actual_sha256": (
                      "8ddd3233b82b45ad2fba37b16daf2d6d7f57a8d3df119a043c356f85ff909af1"
                  ),
                  "declared_inner_compressed_bytes": 53519,
                  "available_inner_payload_bytes": 5260,
                  "evidence_workflow_run": 29243411999,
              },
              "files": sorted(verified_files, key=lambda item: item["path"]),
          }
          (VALIDATION / "zip-validation.json").write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          (VALIDATION / "zip-validation.md").write_text(
              "\n".join(
                  [
                      "# Phase 48 inner archive validation",
                      "",
                      "- Status: **verified**",
                      f"- wjs.zip bytes: {len(archive_bytes)}",
                      f"- wjs.zip SHA-256: `{archive_sha}`",
                      f"- Manifest files: {len(recorded_files)}",
                      f"- Verified UTF-8 files: {len(verified_files)}",
                      "- Extraction root: `recovery/phase48_wip/extracted/`",
                      "",
                      "The extracted files remain recovery evidence only and are not product code.",
                      "",
                  ]
              ),
              encoding="utf-8",
          )
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY

      - name: Preserve verified recovery evidence
        if: github.event_name == 'push'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add recovery/phase48_wip/extracted recovery/phase48_wip/validation
          if git diff --cached --quiet; then
            echo "Verified recovery evidence is already current."
            exit 0
          fi
          git commit -m "backup(phase48): extract and validate emergency workspace"
          git push origin HEAD:backup/phase48-wip-20260712


  phase48-targeted:
    name: Phase 48 focused and contract validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out latest PR 14 Phase 48 HEAD
        uses: actions/checkout@v6
        with:
          ref: codex/phase47-54-engine-completion
          fetch-depth: 0

      - name: Record checked-out target SHA
        run: |
          echo "TARGET_SHA=$(git rev-parse HEAD)"
          git status --short --branch

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-lock.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-lock.txt

      - name: Compile Phase 48 product and focused tests
        run: >-
          python -m compileall -q
          app/schemas/solution.py
          engine/capabilities
          engine/models.py
          engine/services.py
          engine/verification
          tests/test_phase47_candidate_validation.py
          tests/test_phase48_invariants.py
          tests/test_phase48_policy_conditioning.py
          tests/test_phase48_suite.py
          tests/test_phase48_numerical_connections.py
          tests/test_phase48_actual_invariant_connections.py
          tests/test_phase42_baseline_contracts.py

      - name: Run Phase 48 focused tests
        if: ${{ always() }}
        run: >-
          python -m pytest -q -o addopts=
          tests/test_phase48_invariants.py
          tests/test_phase48_policy_conditioning.py
          tests/test_phase48_suite.py
          tests/test_phase48_numerical_connections.py
          tests/test_phase48_actual_invariant_connections.py

      - name: Run Phase 47 candidate regression
        if: ${{ always() }}
        run: python -m pytest -q -o addopts= tests/test_phase47_candidate_validation.py

      - name: Run Phase 42 API and schema contracts
        if: ${{ always() }}
        run: python -m pytest -q -o addopts= tests/test_phase42_baseline_contracts.py

  phase48-full:
    name: Phase 48 full unfiltered backend suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out latest PR 14 Phase 48 HEAD
        uses: actions/checkout@v6
        with:
          ref: codex/phase47-54-engine-completion
          fetch-depth: 0

      - name: Record checked-out target SHA
        run: |
          echo "TARGET_SHA=$(git rev-parse HEAD)"
          git status --short --branch

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-lock.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-lock.txt

      - name: Run complete unfiltered backend suite
        run: python -m pytest -q -o addopts=

  phase48-wrapper:
    name: Phase 48 wrapper - ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: fast
            command: bash ../scripts/check_backend_fast.sh
          - name: benchmark
            command: bash ../scripts/check_backend_benchmark.sh
          - name: audit
            command: bash ../scripts/check_backend_audit.sh
          - name: aggregate
            command: bash ../scripts/check_all.sh
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out latest PR 14 Phase 48 HEAD
        uses: actions/checkout@v6
        with:
          ref: codex/phase47-54-engine-completion
          fetch-depth: 0

      - name: Record checked-out target SHA
        run: |
          echo "TARGET_SHA=$(git rev-parse HEAD)"
          git status --short --branch

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-lock.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-lock.txt

      - name: Run exact ${{ matrix.name }} wrapper
        run: ${{ matrix.command }}

  phase48-budgets:
    name: Phase 48 warm and cold runtime budgets
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out latest PR 14 Phase 48 HEAD
        uses: actions/checkout@v6
        with:
          ref: codex/phase47-54-engine-completion
          fetch-depth: 0

      - name: Record checked-out target SHA
        run: |
          echo "TARGET_SHA=$(git rev-parse HEAD)"
          git status --short --branch

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-lock.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-lock.txt

      - name: Enforce warm solve latency budget
        run: >-
          python scripts/measure_phase42_latency.py
          --repeats 2
          --warmups 1
          --block-optional-dependencies
          --max-mean-ms 60
          --max-p95-ms 120

      - name: Enforce cold import and RSS budgets
        if: ${{ always() }}
        run: >-
          python scripts/measure_runtime_budget.py
          --max-import-ms 5000
          --max-rss-mb 512

  phase48-performance:
    name: Phase 48 fixed Phase 47 performance comparison
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out latest PR 14 Phase 48 HEAD
        uses: actions/checkout@v6
        with:
          ref: codex/phase47-54-engine-completion
          fetch-depth: 0

      - name: Record checked-out target SHA
        run: |
          echo "TARGET_SHA=$(git rev-parse HEAD)"
          git status --short --branch

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-lock.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-lock.txt

      - name: Measure current Phase 48 HEAD
        run: >-
          python scripts/measure_pr10_hotfix_performance.py
          --output /tmp/phase48-head-performance.json
          --repeats 30
          --warmups 5

      - name: Measure fixed Phase 47 baseline with current measurement script
        env:
          BASELINE_SHA: 91c944e96ac303b09568cabb026d9996a523a983
        run: |
          git cat-file -e "${BASELINE_SHA}^{commit}"
          git worktree add --detach /tmp/dynatutor-phase47-base "$BASELINE_SHA"
          cd /tmp/dynatutor-phase47-base/backend
          echo "BASELINE_SHA=$(git rev-parse HEAD)"
          python "$GITHUB_WORKSPACE/backend/scripts/measure_pr10_hotfix_performance.py" \
            --output /tmp/phase47-base-performance.json \
            --repeats 30 \
            --warmups 5

      - name: Compare Phase 48 HEAD to fixed Phase 47 baseline
        run: >-
          python scripts/measure_pr10_hotfix_performance.py
          --compare-base /tmp/phase47-base-performance.json
          --compare-head /tmp/phase48-head-performance.json
          --max-regression-percent 15

      - name: Preserve performance JSON evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: phase48-performance-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /tmp/phase47-base-performance.json
            /tmp/phase48-head-performance.json
          if-no-files-found: warn

