name: Phase 56 Stage 6 finalize

on:
  push:
    branches:
      - codex/phase56-generic-mechanics-engine
    paths:
      - .github/workflows/phase56-stage6-finalize.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: phase56-stage6-finalize
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      PYTHONHASHSEED: "0"
      OPENAI_API_KEY: ""
      ANTHROPIC_API_KEY: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/phase56-generic-mechanics-engine
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Apply Stage 6 runtime integration
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          root = Path.cwd()
          requirement_candidates = [root / "backend" / "requirements.txt", root / "requirements.txt"]
          requirement_path = next((path for path in requirement_candidates if path.exists()), None)
          if requirement_path is None:
              raise SystemExit("requirements file not found")
          requirement_text = requirement_path.read_text(encoding="utf-8")
          if not any(line.strip().lower().startswith("pillow") for line in requirement_text.splitlines()):
              if requirement_text and not requirement_text.endswith("\n"):
                  requirement_text += "\n"
              requirement_text += "Pillow>=10.4.0,<12.0.0\n"
              requirement_path.write_text(requirement_text, encoding="utf-8")

          reconciliation_path = root / "backend" / "engine" / "mechanics" / "evidence_reconciliation.py"
          reconciliation_text = reconciliation_path.read_text(encoding="utf-8")
          old = '''    confirmation_by_conflict = {item.conflict_id: item for item in confirmations}\n    if len(confirmation_by_conflict) != len(tuple(confirmations)):\n'''
          new = '''    confirmation_items = tuple(confirmations)\n    confirmation_by_conflict = {item.conflict_id: item for item in confirmation_items}\n    if len(confirmation_by_conflict) != len(confirmation_items):\n'''
          if old in reconciliation_text:
              reconciliation_path.write_text(reconciliation_text.replace(old, new), encoding="utf-8")

          preferred = [root / "backend" / "app" / "main.py", root / "backend" / "main.py"]
          candidates = preferred + sorted((root / "backend").rglob("*.py"))
          app_path = None
          for path in candidates:
              if not path.exists() or path.name == "mechanics_multimodal_router.py":
                  continue
              text = path.read_text(encoding="utf-8", errors="replace")
              if "FastAPI(" in text and "app =" in text:
                  app_path = path
                  break
          if app_path is None:
              raise SystemExit("FastAPI application root not found")
          app_text = app_path.read_text(encoding="utf-8")
          marker = "# Stage 6 mechanics multimodal evidence router."
          route_path = "/api/mechanics/multimodal/evidence"
          if marker not in app_text and route_path not in app_text:
              if app_text and not app_text.endswith("\n"):
                  app_text += "\n"
              app_text += '''\n# Stage 6 mechanics multimodal evidence router.\nfrom app.mechanics_multimodal_router import router as mechanics_multimodal_router\n\nif not any(getattr(route, "path", None) == "/api/mechanics/multimodal/evidence" for route in app.routes):\n    app.include_router(mechanics_multimodal_router)\n'''
              app_path.write_text(app_text, encoding="utf-8")

          temporary_export = root / ".github" / "workflows" / "phase56-workspace-export.yml"
          temporary_export.unlink(missing_ok=True)
          PY

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate backend on the candidate tree
        working-directory: backend
        run: |
          python -m compileall -q app engine tests
          python -m pytest -q tests/test_phase56_stage6*.py
          python -m pytest -q

      - name: Validate frontend on the candidate tree
        working-directory: frontend
        env:
          CI: "true"
        run: |
          npm ci
          npm test --if-present
          npm run lint --if-present
          npm run build

      - name: Commit the exact validated tree and remove bootstrap
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/phase56-stage6-finalize.yml
          git diff --check
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat(phase56): finalize Stage 6 multimodal integration"
          git push origin HEAD:codex/phase56-generic-mechanics-engine
