name: Phase 55 textbook parser

on:
  pull_request:
    paths:
      - "backend/engine/textbook_parser/**"
      - "backend/tests/test_phase55*"
      - "backend/tools/run_phase55_live_staged.py"
      - "backend/tests/fixtures/phase55/**"
      - "backend/engine/solvers/kinematics.py"
      - "backend/engine/services.py"
      - "frontend/components/understanding/**"
      - "frontend/components/HomeClient.tsx"
      - "frontend/lib/textbookCorrections.*"
      - "frontend/tests/phase55-understanding.test.js"
      - ".github/workflows/phase55-textbook-parser.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase55-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  offline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-lock.txt
      - run: python -m pip install -r requirements-lock.txt
      - name: Compile Phase 55 modules
        run: python -m compileall -q app engine tools/run_phase55_live_staged.py tests/test_phase55_textbook_parser.py tests/test_phase55_textbook_benchmark.py tests/test_phase55_parser_stabilization.py
      - name: Run recorded, adversarial, projection, mode, cache, and benchmark tests
        run: python -m pytest -q -o addopts= tests/test_phase55_textbook_parser.py tests/test_phase55_textbook_benchmark.py tests/test_phase55_parser_stabilization.py

  frontend-round-trip:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Type-check correction UI
        run: npm run typecheck
      - name: Run rendered-contract, keyboard, persistence, and approval round-trip tests
        run: npm test

  live-openai-smoke:
    if: ${{ github.event_name == 'pull_request' && vars.PHASE55_RUN_LIVE_SMOKE == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PYTHONPATH: "."
      TEXTBOOK_PARSER_ENABLED: "true"
      TEXTBOOK_PARSER_MODE: "required"
      TEXTBOOK_PARSER_MODEL: "gpt-5.4-mini-2026-03-17"
      TEXTBOOK_PARSER_REASONING_EFFORT: "low"
      TEXTBOOK_PARSER_STORE: "false"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-lock.txt

      - run: python -m pip install -r requirements-lock.txt

      - name: Run bounded staged OpenAI 8+12 smoke
        run: python tools/run_phase55_live_staged.py
