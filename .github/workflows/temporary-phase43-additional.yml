name: temporary phase43 additional reproduction

on:
  pull_request:
    branches: [main]

jobs:
  reproduce:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 619c047e4080dd83580e94f86de185cb8a619691
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install -r backend/requirements-lock.txt
      - name: Reproduce duplicate and background span findings
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          python - <<'PY'
          import json
          from engine.extraction.extractor import extract_problem

          prompts = {
              "duplicate_unlabeled": "질량 2kg인 물체와 질량 2kg인 다른 물체가 v1=5m/s, v2=5m/s로 충돌한다.",
              "background_hijack": "참고로 트럭은 36km/h다. 공을 발사속도 10m/s로 던졌다. 사거리는?",
          }
          result = {}
          for name, raw in prompts.items():
              cp = extract_problem(raw)
              result[name] = [
                  {
                      "key": fact.compatibility_key,
                      "value": fact.value,
                      "span": fact.source_span,
                      "slice": raw[slice(*fact.source_span)] if fact.source_span else None,
                      "subject": fact.subject_id,
                  }
                  for fact in cp.canonical_v2.facts
                  if fact.compatibility_key in {"m1", "m2", "v0"}
              ]
          print("PHASE43_ADDITIONAL_BASELINE=" + json.dumps(result, ensure_ascii=False, sort_keys=True))
          PY
