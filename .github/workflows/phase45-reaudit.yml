name: Phase 45 re-audit validation

on:
  push:
    branches:
      - agent/phase45
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      BASE_SHA: 9e6f9d0aa6aa60ac0167a0d569dc4c9b1ed52cc8
      BEFORE_SHA: 84685cde354b96c820467a828433fe67bd42dd69
      AFTER_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Record Python and pytest executables
        run: |
          which python
          which pytest
          python -m pytest --version
          pytest --version
      - name: Phase 45 focused tests
        working-directory: backend
        run: pytest -q -o addopts='' tests/test_phase45_typed_dynamics_model.py
      - name: Provenance and NLP compatibility tests
        run: |
          python -m pytest \
            backend/tests/test_phase31_provenance.py \
            backend/tests/test_phase43_canonical_problem_v2.py \
            backend/tests/test_phase44_korean_nlp_robustness.py \
            backend/tests/test_phase45_typed_dynamics_model.py \
            -q -o addopts=
      - name: Backend fast contract
        run: bash scripts/check_backend_fast.sh
      - name: Default backend tests
        run: python -m pytest backend/tests -q
      - name: Full unfiltered backend tests
        run: python -m pytest backend/tests -q -o addopts=
      - name: Backend benchmark contract
        run: bash scripts/check_backend_benchmark.sh
      - name: Frontend metadata contract
        run: bash scripts/check_frontend_metadata.sh
      - name: Same-environment base-before-after benchmark and profile
        run: |
          git worktree add --detach /tmp/phase45-base "$BASE_SHA"
          git worktree add --detach /tmp/phase45-before "$BEFORE_SHA"
          git worktree add --detach /tmp/phase45-after "$AFTER_SHA"

          run_bench() {
            python - "$1" "$2" "$3" <<'PY'
          import cProfile
          import json
          import math
          import pstats
          import statistics
          import sys
          import time
          from pathlib import Path

          root = Path(sys.argv[1])
          label = sys.argv[2]
          output = Path(sys.argv[3])
          sys.path.insert(0, str(root / "backend"))

          import sympy as sp
          from engine.equation_generators import energy_momentum, particle_newton
          from engine.model_builder import build_physical_model
          try:
              from engine.model_builder import typed_builder
          except ImportError:
              typed_builder = None
          from engine.models import CanonicalProblem, Quantity
          from engine.solvers.collision import Collision1DSolver
          from engine.solvers.incline import InclineWithFrictionSolver
          from engine.solvers.pulley.massive_pulley import MassivePulleyAtwoodSolver

          def q(symbol, value, unit):
              return Quantity(symbol=symbol, value=value, unit=unit, source_text=f"{value} {unit}")

          def incline():
              return CanonicalProblem(
                  system_type="particle_on_incline",
                  subtype="with_friction",
                  friction_type="kinetic",
                  flags={"friction": True},
                  knowns={
                      "m": q("m", 2.0, "kg"),
                      "g": q("g", 9.81, "m/s^2"),
                      "theta": q("theta", 30.0, "deg"),
                      "mu": q("mu", 0.2, None),
                  },
                  requested_outputs=["acceleration"],
              )

          def collision():
              return CanonicalProblem(
                  system_type="collision_1d",
                  flags={"elastic": False},
                  knowns={
                      "m1": q("m1", 2.0, "kg"),
                      "m2": q("m2", 3.0, "kg"),
                      "v1": q("v1", 4.0, "m/s"),
                      "v2": q("v2", 0.0, "m/s"),
                      "e": q("e", 0.5, None),
                  },
                  requested_outputs=["post_collision_velocity"],
              )

          def massive():
              return CanonicalProblem(
                  system_type="massive_pulley_atwood",
                  knowns={
                      "m1": q("m1", 2.0, "kg"),
                      "m2": q("m2", 4.0, "kg"),
                      "I": q("I", 0.5, "kg*m^2"),
                      "R": q("R", 0.5, "m"),
                      "g": q("g", 9.81, "m/s^2"),
                  },
                  requested_outputs=["acceleration", "tension"],
              )

          actions = {
              "incline_solve": lambda: InclineWithFrictionSolver().solve(incline()),
              "collision_solve": lambda: Collision1DSolver().solve(collision()),
              "massive_pulley_solve": lambda: MassivePulleyAtwoodSolver().solve(massive()),
              "build_physical_model_incline": lambda: build_physical_model(incline()),
          }

          def capture(value):
              if hasattr(value, "to_dict"):
                  return value.to_dict()
              return {
                  "ok": value.ok,
                  "answer": value.answer.__dict__ if value.answer else None,
                  "answers": [item.__dict__ for item in value.answers],
                  "errors": list(value.verification.errors),
                  "warnings": list(value.verification.warnings),
                  "unsupported_reason": value.unsupported_reason,
              }

          def percentile_95(samples):
              ordered = sorted(samples)
              return ordered[math.ceil(0.95 * len(ordered)) - 1]

          results = {
              "label": label,
              "python": sys.executable,
              "warmup": 5,
              "repeat": 50,
              "timings_ms": {},
              "outputs": {},
              "counts": {},
              "profiles": {},
              "legacy_views": {
                  "incline": build_physical_model(incline()).to_dict(),
                  "collision": build_physical_model(collision()).to_dict(),
                  "massive_pulley": build_physical_model(massive()).to_dict(),
              },
          }

          for name, action in actions.items():
              for _ in range(results["warmup"]):
                  action()
              samples = []
              final_value = None
              for _ in range(results["repeat"]):
                  start = time.perf_counter_ns()
                  final_value = action()
                  samples.append((time.perf_counter_ns() - start) / 1_000_000)
              results["timings_ms"][name] = {
                  "mean": statistics.fmean(samples),
                  "median": statistics.median(samples),
                  "p95": percentile_95(samples),
                  "max": max(samples),
              }
              results["outputs"][name] = capture(final_value)

              counts = {"simplify": 0, "typed_model": 0, "newton_system": 0, "energy_system": 0}
              original_simplify = sp.simplify
              original_newton = particle_newton.build_particle_newton_system
              original_energy = energy_momentum.build_energy_momentum_system
              original_typed = (
                  typed_builder.build_typed_dynamics_model
                  if typed_builder is not None
                  else None
              )

              def counted_simplify(*args, **kwargs):
                  counts["simplify"] += 1
                  return original_simplify(*args, **kwargs)

              def counted_newton(*args, **kwargs):
                  counts["newton_system"] += 1
                  return original_newton(*args, **kwargs)

              def counted_energy(*args, **kwargs):
                  counts["energy_system"] += 1
                  return original_energy(*args, **kwargs)

              def counted_typed(*args, **kwargs):
                  counts["typed_model"] += 1
                  return original_typed(*args, **kwargs)

              sp.simplify = counted_simplify
              particle_newton.build_particle_newton_system = counted_newton
              energy_momentum.build_energy_momentum_system = counted_energy
              if typed_builder is not None:
                  typed_builder.build_typed_dynamics_model = counted_typed
              try:
                  action()
              finally:
                  sp.simplify = original_simplify
                  particle_newton.build_particle_newton_system = original_newton
                  energy_momentum.build_energy_momentum_system = original_energy
                  if typed_builder is not None:
                      typed_builder.build_typed_dynamics_model = original_typed
              results["counts"][name] = counts

              profiler = cProfile.Profile()
              profiler.enable()
              for _ in range(10):
                  action()
              profiler.disable()
              stats = pstats.Stats(profiler).strip_dirs().sort_stats("cumulative")
              ranked = sorted(
                  stats.stats.items(),
                  key=lambda item: item[1][3],
                  reverse=True,
              )[:8]
              results["profiles"][name] = [
                  {
                      "function": f"{key[0]}:{key[1]}:{key[2]}",
                      "calls": value[1],
                      "cumulative_seconds": value[3],
                  }
                  for key, value in ranked
              ]

          output.write_text(json.dumps(results, ensure_ascii=False, sort_keys=True), encoding="utf-8")
          print(json.dumps(results, ensure_ascii=False, indent=2, sort_keys=True))
          PY
          }

          run_bench /tmp/phase45-base base /tmp/phase45-base.json
          run_bench /tmp/phase45-before before /tmp/phase45-before.json
          run_bench /tmp/phase45-after after /tmp/phase45-after.json

          python - <<'PY'
          import json
          from pathlib import Path

          base = json.loads(Path("/tmp/phase45-base.json").read_text())
          before = json.loads(Path("/tmp/phase45-before.json").read_text())
          after = json.loads(Path("/tmp/phase45-after.json").read_text())

          assert base["outputs"] == after["outputs"], "solver outputs/exceptions differ from base"
          assert base["legacy_views"] == after["legacy_views"], "PhysicalModel.to_dict differs from base"
          assert base["legacy_views"]["incline"] != before["legacy_views"]["incline"], (
              "starting-head incline regression was not reproduced"
          )

          print("| path | base mean | before mean | after mean | after median | after p95 | after max | abs vs base | ratio vs base |")
          print("|---|---:|---:|---:|---:|---:|---:|---:|---:|")
          for name in base["timings_ms"]:
              b = base["timings_ms"][name]
              old = before["timings_ms"][name]
              new = after["timings_ms"][name]
              print(
                  f"| {name} | {b['mean']:.3f} | {old['mean']:.3f} | {new['mean']:.3f} | "
                  f"{new['median']:.3f} | {new['p95']:.3f} | {new['max']:.3f} | "
                  f"{new['mean'] - b['mean']:+.3f} | {new['mean'] / b['mean']:.2f}x |"
              )
          print("COUNTS_BEFORE", json.dumps(before["counts"], sort_keys=True))
          print("COUNTS_AFTER", json.dumps(after["counts"], sort_keys=True))
          print("PROFILES_AFTER", json.dumps(after["profiles"], sort_keys=True))
          print("RESULT_EQUALITY base==after: true")
          print("EXCEPTION_EQUALITY base==after: true")
          print("LEGACY_VIEW_EQUALITY base==after: true")
          PY
