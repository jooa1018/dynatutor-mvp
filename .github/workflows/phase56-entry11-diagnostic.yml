name: Phase 56 Entry 12 acceptance worker

on:
  pull_request:
    branches:
      - codex/phase56-generic-mechanics-engine

permissions:
  contents: write

jobs:
  entry12-acceptance:
    if: github.event.pull_request.head.ref == 'codex/phase56-entry11-diagnostic'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Check out diagnostic control branch
        uses: actions/checkout@v6
        with:
          ref: codex/phase56-entry11-diagnostic
          fetch-depth: 0
      - name: Check exact remote authority and prepare target tree
        shell: bash
        run: |
          set -euo pipefail
          expected=fbe6a8ad88c87d3bea378e498fef4d199576dd4e
          remote_head="$(git ls-remote origin refs/heads/codex/phase56-generic-mechanics-engine | cut -f1)"
          test "$remote_head" = "$expected"
          git checkout --detach "$expected"
          mkdir -p phase56-entry12-evidence
          printf '%s\n' "$remote_head" > phase56-entry12-evidence/input-head.txt
      - name: Apply exact Entry 12 patch
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' '' | base64 -d | gzip -d > /tmp/entry12.patch
          git apply --check /tmp/entry12.patch
          git apply /tmp/entry12.patch
          git diff --check
          git diff > phase56-entry12-evidence/entry12.diff
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements-lock.txt
      - name: Install locked backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-lock.txt
      - name: Compile changed and connected modules
        shell: bash
        run: |
          python -m py_compile \
            backend/engine/mechanics/solver/contracts.py \
            backend/tests/test_phase56_mechanics_constant_acceleration_same_fixture_parity.py \
            2>&1 | tee phase56-entry12-evidence/py-compile.log
      - name: Run Entry 12 focused fast
        shell: bash
        run: |
          set -o pipefail
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 \
          PYTHONPATH="$PWD/backend:$PWD/backend/tests" \
          python -m pytest -q -o addopts= -m 'not slow' \
            backend/tests/test_phase56_mechanics_constant_acceleration_same_fixture_parity.py \
            2>&1 | tee phase56-entry12-evidence/fast.log
      - name: Run Entry 12 focused slow
        shell: bash
        run: |
          set -o pipefail
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 \
          PYTHONPATH="$PWD/backend:$PWD/backend/tests" \
          python -m pytest -q -o addopts= -m slow \
            backend/tests/test_phase56_mechanics_constant_acceleration_same_fixture_parity.py \
            2>&1 | tee phase56-entry12-evidence/slow.log
      - name: Run connected compiler solver verifier and migration regressions
        shell: bash
        run: |
          set -o pipefail
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 \
          PYTHONPATH="$PWD/backend:$PWD/backend/tests" \
          python -m pytest -q -o addopts= \
            -m 'not slow and not benchmark and not audit and not frontend' \
            backend/tests/test_phase56_mechanics_compiler.py \
            backend/tests/test_phase56_mechanics_solver_contract.py \
            backend/tests/test_phase56_mechanics_solver_planner.py \
            backend/tests/test_phase56_mechanics_solver_execution.py \
            backend/tests/test_phase56_mechanics_solver_verification_integration.py \
            backend/tests/test_phase56_mechanics_verifier.py \
            backend/tests/test_phase56_mechanics_migration_harness.py \
            backend/tests/test_phase56_mechanics_collision_1d_same_fixture_parity.py \
            2>&1 | tee phase56-entry12-evidence/connected-regressions.log
      - name: Commit and push Entry 12 atomically
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git config user.name 'DynaTutor Phase 56 Worker'
          git config user.email 'phase56-worker@users.noreply.github.com'
          git add \
            backend/engine/mechanics/solver/contracts.py \
            backend/tests/test_phase56_mechanics_constant_acceleration_same_fixture_parity.py
          git commit -m 'feat(phase56): migrate constant acceleration 1d [skip ci]'
          commit_sha="$(git rev-parse HEAD)"
          printf '%s\n' "$commit_sha" > phase56-entry12-evidence/entry12-commit-sha.txt
          git push origin HEAD:refs/heads/codex/phase56-generic-mechanics-engine
      - name: Upload Entry 12 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase56-entry12-acceptance-evidence
          path: phase56-entry12-evidence
          if-no-files-found: error
          retention-days: 14
