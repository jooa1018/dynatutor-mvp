name: temporary phase43 corrective validation

on:
  pull_request:
    branches: [main]

jobs:
  reproduce-main:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 619c047e4080dd83580e94f86de185cb8a619691
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-lock.txt
      - name: Reproduce audited main behavior
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          python - <<'PY'
          import json
          from engine.extraction.extractor import extract_problem
          from engine.routing.clarify import apply_clarify_patch

          def snapshot(raw):
              cp = extract_problem(raw)
              return cp, {
                  "knowns": {key: quantity.value for key, quantity in cp.knowns.items()},
                  "facts": [
                      {
                          "key": fact.compatibility_key,
                          "subject": fact.subject_id,
                          "value": fact.value,
                          "status": fact.status,
                          "provenance": fact.provenance,
                          "confidence": fact.confidence,
                          "span": fact.source_span,
                          "alternatives": fact.alternatives,
                      }
                      for fact in cp.canonical_v2.facts
                      if fact.kind == "quantity"
                  ],
                  "conflicts": cp.canonical_v2.conflicts,
              }

          prompts = {
              "horizontal_theta": "공을 수평으로 10 m/s로 절벽에서 던졌다. 절벽의 높이는 20 m이다. 비행시간은?",
              "v0_15": "공을 속력 v0=15 m/s, 발사각 30도로 던졌다. 사거리는?",
              "equivalent_units": "자동차의 v0=36km/h, v0=10m/s이고 가속도 a=2m/s^2이다. 5s 후 최종속도는?",
              "conflict": "질량 m1=2kg이고 다른 문장에는 m1=3kg이라고 적혀 있다. 힘 F=10N일 때 가속도는?",
              "same_numbers": "m1=2kg인 물체와 m2=2kg인 물체가 v1=5m/s, v2=5m/s로 충돌한다.",
              "background": "참고로 옆 트럭은 36 km/h로 달린다. 자동차는 v0=10 m/s이고 가속도 a=2 m/s^2이다. 5 s 후 최종속도는?",
              "amplitude": "질량 m=2kg, 스프링 상수 k=8N/m, 진폭 A=0.5m인 진동의 주기는?",
          }
          results = {}
          cps = {}
          for name, raw in prompts.items():
              cp, result = snapshot(raw)
              cps[name] = cp
              results[name] = result

          patched = apply_clarify_patch(
              cps["conflict"],
              {"set_known": {"symbol": "m1", "value": 2, "unit": "kg", "label": "첫 번째 물체 질량"}},
          )
          results["clarified_conflict"] = {
              "facts": [
                  {
                      "key": fact.compatibility_key,
                      "value": fact.value,
                      "status": fact.status,
                      "provenance": fact.provenance,
                      "confidence": fact.confidence,
                      "alternatives": fact.alternatives,
                  }
                  for fact in patched.canonical_v2.facts
                  if fact.compatibility_key == "m1"
              ],
              "conflicts": patched.canonical_v2.conflicts,
          }
          print("PHASE43_MAIN_BASELINE=" + json.dumps(results, ensure_ascii=False, sort_keys=True))
          PY

  validate-head:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONPATH: ${{ github.workspace }}/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-lock.txt
      - name: New and related provenance regressions
        run: python -m pytest backend/tests/test_phase43_canonical_problem_v2.py backend/tests/test_phase31_provenance.py -q -o addopts=
      - name: Related extraction and clarification selectors
        run: python -m pytest backend/tests -q -o addopts= -k "phase31 or phase38 or phase40 or phase43"
      - name: Phase 43 canonical v2
        run: python -m pytest backend/tests/test_phase43_canonical_problem_v2.py -q -o addopts=
      - name: Phase 31 provenance
        run: python -m pytest backend/tests/test_phase31_provenance.py -q -o addopts=
      - name: Backend fast
        run: bash scripts/check_backend_fast.sh
      - name: Backend configured suite
        run: python -m pytest backend/tests -q
      - name: Backend unfiltered suite
        run: python -m pytest backend/tests -q -o addopts=
      - name: Frontend metadata
        run: bash scripts/check_frontend_metadata.sh
