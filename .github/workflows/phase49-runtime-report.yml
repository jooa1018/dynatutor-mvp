name: Phase 49 runtime report capture

on:
  push:
    branches:
      - codex/phase47-54-engine-completion
    paths:
      - .github/workflows/phase49-runtime-report.yml

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TARGET_SHA: b38fe37e4021f8f79209efab52a1fbb6388eee93

    steps:
      - name: Checkout capture workflow
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-lock.txt

      - name: Create exact Phase 49 functional worktree
        shell: bash
        run: |
          set -euo pipefail
          TARGET_ROOT="$RUNNER_TEMP/dynatutor-phase49-functional"
          OUT_ROOT="$RUNNER_TEMP/phase49-report"
          git cat-file -e "${TARGET_SHA}^{commit}"
          git worktree add --detach "$TARGET_ROOT" "$TARGET_SHA"
          test "$(git -C "$TARGET_ROOT" rev-parse HEAD)" = "$TARGET_SHA"
          {
            echo "TARGET_ROOT=$TARGET_ROOT"
            echo "OUT_A=$OUT_ROOT/a"
            echo "OUT_B=$OUT_ROOT/b"
          } >> "$GITHUB_ENV"
          echo "functional_head=$TARGET_SHA"

      - name: Install exact locked backend dependencies
        run: python -m pip install -r "$TARGET_ROOT/backend/requirements-lock.txt"

      - name: Run deterministic Phase 49 report twice
        shell: bash
        run: |
          set -euo pipefail
          cd "$TARGET_ROOT/backend"
          python tools/run_phase49_consistency.py \
            --json-out "$OUT_A/phase49_solver_consistency.json" \
            --markdown-out "$OUT_A/phase49_solver_consistency.md"
          python tools/run_phase49_consistency.py \
            --json-out "$OUT_B/phase49_solver_consistency.json" \
            --markdown-out "$OUT_B/phase49_solver_consistency.md"
          cmp -s \
            "$OUT_A/phase49_solver_consistency.json" \
            "$OUT_B/phase49_solver_consistency.json"
          cmp -s \
            "$OUT_A/phase49_solver_consistency.md" \
            "$OUT_B/phase49_solver_consistency.md"
          echo "deterministic_json=true"
          echo "deterministic_markdown=true"

      - name: Verify Phase 49 acceptance fields
        shell: bash
        run: |
          set -euo pipefail
          REPORT="$OUT_A/phase49_solver_consistency.json"
          jq -e '
            .schema_version == 2 and
            .report_version == "phase49-solver-consistency-report-v2" and
            .status == "passed" and
            .passed == true and
            .offline_only == true and
            .student_answer_overwrite == false and
            (.disagreements | length) == 0 and
            (.cases | length) == 60 and
            all(.cases[]; .passed == true) and
            (.metamorphic_relations | length) == 21 and
            all(.metamorphic_relations[]; .passed == true) and
            (.mutation_controls | length) == 4 and
            all(.mutation_controls[]; .passed == true) and
            (.summary |
              .oracle_cases == 60 and
              .scalar_expected_outputs == 70 and
              .product_verified_executed == 60 and
              .product_verified_passed == 60 and
              .oracle_product_executed == 60 and
              .oracle_product_passed == 60 and
              .oracle_secondary_executed == 60 and
              .oracle_secondary_passed == 60 and
              .product_secondary_executed == 60 and
              .product_secondary_passed == 60 and
              .three_way_executed == 60 and
              .three_way_passed == 60 and
              .distinct_metamorphic_relations == 21 and
              .metamorphic_executed == 21 and
              .metamorphic_passed == 21 and
              .mutation_controls_executed == 4 and
              .mutations_killed == 4)
          ' "$REPORT"
          jq '{
            schema_version,
            report_version,
            oracle_version,
            benchmark_version,
            relation_version,
            policy_version,
            fixture_sha256,
            status,
            passed,
            offline_only,
            student_answer_overwrite,
            summary,
            disagreement_count: (.disagreements | length)
          }' "$REPORT"
          sha256sum \
            "$OUT_A/phase49_solver_consistency.json" \
            "$OUT_A/phase49_solver_consistency.md"

      - name: Upload passed deterministic reports
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: phase49-runtime-report-b38fe37e-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/phase49-report/a/phase49_solver_consistency.json
            ${{ runner.temp }}/phase49-report/a/phase49_solver_consistency.md
          if-no-files-found: error
          retention-days: 14
