[pytest]
pythonpath = .
addopts = -m "not benchmark and not audit and not frontend and not slow"
markers =
    unit: fast unit tests
    regression: physics regression tests
    negative: unsupported/missing-info tests
    benchmark: benchmark and blind textbook-style tests
    audit: phase audit and documentation/deployment audit tests
    frontend: frontend package/build metadata tests
    slow: slow tests that should not run by default
